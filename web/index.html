<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#eef6fb" />
    <title>MB Tuner</title>
    <meta
      name="description"
      content="MB Tuner — a chromatic tuner that runs entirely in your browser. No ads, no analytics, no accounts."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23003a5c'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='14' fill='%235cc0ff'%3EMB%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" id="app-root">
      <!-- Ambient gradient backdrop. Pointer-events disabled via CSS. -->
      <div class="ambient" aria-hidden="true">
        <div class="ambient-sweep"></div>
        <div class="ambient-glow-top"></div>
        <div class="ambient-glow-bottom"></div>
        <div class="ambient-glow-corner"></div>
      </div>

      <header class="topbar">
        <div class="title">MB Tuner</div>
        <div class="topbar-controls">
          <button
            type="button"
            class="icon-button"
            id="settings-button"
            aria-label="Settings"
            aria-haspopup="dialog"
          >
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"
              />
            </svg>
          </button>
        </div>
      </header>

      <section class="main">
        <div class="note-display" id="note-display">
          <div class="target-row is-hidden" id="target-row">
            <span class="hz-tag">Target</span>
            <span class="target-hz" id="target-hz"></span>
          </div>
          <div class="note-row">
            <span class="note is-placeholder" id="note">Play a note</span>
            <span class="octave" id="octave" hidden></span>
          </div>
          <div class="live-hz" id="live-hz"></div>
        </div>

        <div class="meter-section">
          <div class="meter-wrap" id="meter-wrap"></div>
          <button
            type="button"
            class="tuner-toggle"
            id="tuner-toggle-button"
            aria-label="Stop tuner"
            aria-pressed="false"
          >
            Stop Tuner
          </button>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-text" id="aref-footer">A = 440 Hz</div>
        <button
          type="button"
          class="permission-banner"
          id="permission-banner"
          hidden
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 3l18 18 M9 9v3a3 3 0 0 0 5.1 2.1 M15 12V6a3 3 0 0 0-6 0v.5 M19 12a7 7 0 0 1-.6 2.8 M5 12a7 7 0 0 0 7 7 M12 19v3"
            />
          </svg>
          <span id="permission-text">Microphone access is needed. Click to retry.</span>
        </button>
      </footer>
    </main>

    <!-- Settings modal. Rendered as a dialog-like overlay. -->
    <div class="modal" id="settings-modal" hidden role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="ambient" aria-hidden="true">
        <div class="ambient-sweep"></div>
        <div class="ambient-glow-top"></div>
        <div class="ambient-glow-bottom"></div>
        <div class="ambient-glow-corner"></div>
      </div>
      <div class="modal-inner">
        <header class="topbar">
          <h2 class="modal-title" id="settings-title">Settings</h2>
          <button
            type="button"
            class="icon-button"
            id="settings-close"
            aria-label="Close settings"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                d="M6 6l12 12 M18 6L6 18"
              />
            </svg>
          </button>
        </header>

        <div class="modal-content">
          <section class="section">
            <h3 class="section-title">Reference pitch</h3>
            <div class="section-body">
              <p class="hint">
                Concert pitch A4 used as the tuning reference.
              </p>
              <div
                class="segment"
                id="aref-segment"
                role="radiogroup"
                aria-label="A reference frequency"
              ></div>
            </div>
          </section>

          <section class="section">
            <h3 class="section-title">Appearance</h3>
            <div class="section-body">
              <div
                class="segment"
                id="theme-segment"
                role="radiogroup"
                aria-label="Theme"
              ></div>
            </div>
          </section>

          <section class="section">
            <h3 class="section-title">About</h3>
            <div class="section-body">
              <div class="row">
                <span class="row-label">Version</span>
                <span class="row-value">1.0.0 (web)</span>
              </div>
              <p class="hint subtle">
                MB Tuner runs entirely in your browser. Audio is analyzed
                locally; nothing is recorded, stored, or sent over the network.
              </p>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
